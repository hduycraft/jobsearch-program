services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: careermatch
      POSTGRES_USER: careermatch
      POSTGRES_PASSWORD: careermatch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careermatch -d careermatch"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
